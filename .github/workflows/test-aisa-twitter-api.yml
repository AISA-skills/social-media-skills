name: Test AIsa Twitter API client

on:
  pull_request:
    paths:
      - "aisa-twitter-api/**"
      - ".github/workflows/test-aisa-twitter-api.yml"
  push:
    branches:
      - main
    paths:
      - "aisa-twitter-api/**"
      - ".github/workflows/test-aisa-twitter-api.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile client
        run: python -m py_compile aisa-twitter-api/scripts/twitter_client.py
      - name: Run tests
        run: python -m unittest discover -s aisa-twitter-api/tests -v
